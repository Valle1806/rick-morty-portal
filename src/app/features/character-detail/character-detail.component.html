<div class="main-container bg-grid-mesh min-h-screen">
  <button routerLink="/characters" class="btn-portal-sm mb-12">
    Volver al Portal
  </button>

  @if (character$ | async; as char) {
    <div class="terminal-panel flex flex-col md:flex-row gap-10">
      
      <div class="md:w-1/3">
        <div class="card-comic">
          <img [src]="char.image" loading="lazy" [alt]="char.name" class="w-full h-auto object-cover">
          
          <div class="absolute top-4 left-4 status-badge" 
               [ngClass]="char.status.toLowerCase()">
            <span class="dot"></span>
            {{ char.status }}
          </div>
        </div>
      </div>

      <div class="md:w-2/3 flex flex-col justify-between">
        <div>
          <h1 class="text-6xl md:text-8xl mb-6 text-glow-green">
            {{ char.name }}
          </h1>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8 font-medium">
            @for (field of displayFields; track field.label) {
              <div class="space-y-1">
                <span class="text-[#00b0c8] text-xs uppercase font-black">
                  {{ field.label }}
                </span>
                <p class="text-xl text-slate-100">
                  {{ getFieldValue(char, field) }}
                </p>
              </div>
            }
          </div>
        </div>

        <div class="mt-8">
         <button 
          (click)="toggleFavorite(char)" 
          [ngClass]="(facade.isFavorite(char.id) | async)? 'btn-fav-active' : 'btn-fav-inactive'"
          class="w-full md:w-auto transform active:scale-95">
             {{ (facade.isFavorite(char.id) | async) ? 'Quitar de Favoritos' : 'Agregar a Favoritos' }}
          </button>
        </div>
      </div>
    </div>
  } @else {
    <div class="portal-loader-wrapper">
      <div class="portal-ring"></div>
      <div class="portal-label">Escaneando multiverso...</div>
    </div>
  }
</div>
