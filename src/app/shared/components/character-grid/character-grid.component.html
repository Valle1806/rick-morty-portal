<div class="relative w-full">
  
  @if (characters.length > 0) {
    
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
      @for (char of characters; track char.id) {
        <app-character-card 
          [character]="char"
          [showFavoriteButton]="isFavoritesView"
          [isFavorite]="favoriteIds.includes(char.id)"
          (toggleFavorite)="handleToggleFavorite($event)">
        </app-character-card>
      }
    </div>

    @if (showPagination && totalPages > 1) {
      <div class="mt-16 flex items-center justify-center gap-6 pb-10">
        
        <button 
          type="button"
          (click)="onPageChange(currentPage - 1)" 
          [disabled]="currentPage === 1" 
          class="btn-portal-sm">
          Anterior
        </button>

        <div class="terminal-panel px-6 py-2 rounded-xl">
          <span class="font-mono text-[#97ce4c] font-bold">
            {{ currentPage }} / {{ totalPages }}
          </span>
        </div>

        <button 
          type="button"
          (click)="onPageChange(currentPage + 1)" 
          [disabled]="currentPage === totalPages" 
          class="btn-portal-sm">
          Siguiente
        </button>

      </div>
    }

  } @else {
    <div class="terminal-panel text-center py-20 border-dashed border-2">
      <p class="text-xl font-rick text-[#f0e130]">
        No se detectan firmas biológicas en esta sección.
      </p>
      <p class="font-mono text-xs text-slate-500 mt-2 uppercase tracking-widest">
        Scan Interdimensional Finalizado
      </p>
    </div>
  }

</div>
