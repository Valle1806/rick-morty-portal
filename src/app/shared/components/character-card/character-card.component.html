<a [routerLink]="['/characters', character.id]" class="card-comic group block h-full">
  
  @if (showFavoriteButton) {
    <button 
      type="button"
      (click)="onFavoriteClick($event)"
      class="fav-button"
      [class.remove-mode]="showFavoriteButton"> <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  }

  <div class="relative overflow-hidden aspect-square border-b-4 border-slate-800 bg-slate-950">
    <img 
      [src]="character.image" 
      [alt]="character.name"
      class="w-full h-full object-cover" 
      (error)="handleImgError($event)">
    </div>

  <div class="p-5 flex flex-col bg-slate-900">
    <h3 class="text-2xl mb-3 truncate font-rick">{{ character.name }}</h3>
    
    <div class="status-badge mb-6" [ngClass]="character.status.toLowerCase()">
      <span class="dot"></span>
      <span class="font-mono text-xs uppercase">{{ character.status }} - {{ character.species }}</span>
    </div>

    <div class="btn-action text-center">
      Detalle
    </div>
  </div>
</a>
