<a [routerLink]="['/characters', character.id]" class="card-comic group block h-full">
  
  @if (showFavoriteButton) {
    <button 
      type="button"
      (click)="onFavoriteClick($event)"
      class="fav-button"
      [class.active]="isFavorite">
      <svg viewBox="0 0 100 100" class="h-6 w-6" [attr.fill]="isFavorite ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="6">
        <path d="M50 88.5 c-2.1 -1.9 -10.3 -9.1 -18.2 -16.1 c-11.8 -10.4 -21.4 -20.8 -21.4 -31 c0 -11.9 9.1 -21 21.4 -21 c5.1 0 9.8 1.9 13.5 5.2 c1.1 1 3.2 2.9 4.7 4.2 c1.5 -1.3 3.6 -3.2 4.7 -4.2 c3.7 -3.3 8.4 -5.2 13.5 -5.2 c12.3 0 21.4 9.1 21.4 21 c0 10.2 -9.6 20.6 -21.4 31 c-7.9 7 -16.1 14.2 -18.2 16.1 Z" />
      </svg>
    </button>
  }

  <div class="relative overflow-hidden aspect-square border-b-4 border-slate-800 bg-slate-950">
    <img 
      [src]="character.image" 
      [alt]="character.name"
      class="w-full h-full object-cover" 
      (error)="handleImgError($event)">
    </div>

  <div class="p-5 flex flex-col bg-slate-900">
    <h3 class="text-2xl mb-3 truncate font-rick">{{ character.name }}</h3>
    
    <div class="status-badge mb-6" [ngClass]="character.status.toLowerCase()">
      <span class="dot"></span>
      <span class="font-mono text-xs uppercase">{{ character.status }} - {{ character.species }}</span>
    </div>

    <div class="btn-action text-center">
      Detalle
    </div>
  </div>
</a>
